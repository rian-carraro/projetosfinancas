<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Finanças</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7F77DD">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Finanças">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icon-16.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo"><span>Minhas Finanças</span></div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">Entrar</button>
        <button class="auth-tab" onclick="switchAuthTab('register')">Criar conta</button>
      </div>

      <div id="auth-login">
        <div class="form-group"><label>Email</label><input id="login-email" type="email" placeholder="seu@email.com" autocomplete="email"></div>
        <div class="form-group"><label>Senha</label><input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password"></div>
        <div id="login-error" class="auth-error"></div>
        <button class="btn btn-primary w-full" onclick="doLogin()">Entrar</button>
      </div>

      <div id="auth-register" style="display:none">
        <div class="form-group"><label>Nome</label><input id="reg-name" placeholder="Seu nome" autocomplete="off"></div>
        <div class="form-group"><label>Email</label><input id="reg-email" type="email" placeholder="seu@email.com" autocomplete="off"></div>
        <div class="form-group"><label>Senha</label><input id="reg-password" type="password" placeholder="mínimo 6 caracteres" autocomplete="new-password"></div>
        <div id="reg-error" class="auth-error"></div>
        <button class="btn btn-primary w-full" onclick="doRegister()">Criar conta</button>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="app" style="display:none">
    <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo"><span>Minhas</span>&nbsp;Finanças</div>
      <nav id="nav"></nav>
      <div class="sidebar-bottom">
        <div class="sidebar-user" id="sidebar-user"></div>
        <button class="sidebar-logout" onclick="doLogout()">Sair</button>
      </div>
    </aside>

    <div class="main" id="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="hamburger" onclick="toggleSidebar()">☰</button>
          <h2 id="page-title">Dashboard</h2>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Alternar tema">Modo claro</button>
      </div>
      <div class="content" id="content">
        <div class="loading-state">Carregando...</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>

  <!-- Registra o Service Worker para PWA -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .catch(err => console.warn("SW não registrado:", err));
      });
    }
  </script>
</body>
</html>
